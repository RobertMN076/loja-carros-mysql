<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Carros - Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        button { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;}
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; width: auto; padding: 5px 10px; font-size: 14px;}
        .btn-danger:hover { background-color: #c0392b; }
        #dashboard { display: none; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;}
        .logout { background-color: transparent; color: #7f8c8d; width: auto; text-decoration: underline; cursor: pointer; padding: 0;}
        .logout:hover { background-color: transparent; color: #34495e;}
        .header-dash { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;}
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>Painel de Controle</h1>
        <p>Faça login para gerenciar o estoque.</p>
        <div class="form-group">
            <label>Usuário</label>
            <input type="text" id="username" placeholder="Digite o usuário">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="password" placeholder="Digite a senha">
        </div>
        <button onclick="fazerLogin()">Entrar</button>
        <p id="login-error" style="color: red; display: none;">Credenciais inválidas ou erro de conexão.</p>
    </div>

    <div id="dashboard">
        <div class="header-dash">
            <h2>Estoque de Veículos</h2>
            <button class="logout" onclick="sair()">Sair do Sistema</button>
        </div>

        <div style="background: #f9f9f9; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
            <h3>Cadastrar Novo Veículo</h3>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="marca" placeholder="Marca (ex: Toyota)">
                <input type="text" id="modelo" placeholder="Modelo (ex: Corolla)">
                <button style="width: 150px;" onclick="cadastrarVeiculo()">Salvar</button>
            </div>
        </div>

        <div id="lista-veiculos">
        </div>
    </div>
</div>

<script>
    const HOST = window.location.hostname;
    const API_URL = HOST === 'localhost' || HOST === '127.0.0.1'
        ? 'http://localhost:8080/api'
        : `http://${window.location.host}/api`;

    // Login
    async function fazerLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                // O nome exato da chave depende do seu Record, geralmente é 'token'
                tokenJWT = data.token || data.tokenJWT;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                buscarVeiculos();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        } catch (error) {
            console.error(error);
            document.getElementById('login-error').style.display = 'block';
        }
    }

    // Listar Veículos
    async function buscarVeiculos() {
        try {
            const response = await fetch(`${API_URL}/veiculos`, {
                headers: { 'Authorization': `Bearer ${tokenJWT}` }
            });

            if(response.ok) {
                const veiculos = await response.json();
                renderizarLista(veiculos);
            }
        } catch (error) {
            console.error("Erro ao buscar veículos", error);
        }
    }

    // Cadastrar Veículo
    async function cadastrarVeiculo() {
        const marca = document.getElementById('marca').value;
        const modelo = document.getElementById('modelo').value;

        if(!marca || !modelo) return alert("Preencha marca e modelo!");

        try {
            const response = await fetch(`${API_URL}/veiculos`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${tokenJWT}`
                },
                body: JSON.stringify({ marca, modelo })
            });

            if (response.ok) {
                document.getElementById('marca').value = '';
                document.getElementById('modelo').value = '';
                buscarVeiculos(); // Atualiza a lista
            }
        } catch (error) {
            console.error("Erro ao salvar", error);
        }
    }

    // Deletar Veículo
    async function deletarVeiculo(id) {
        if(!confirm("Certeza que deseja excluir este veículo?")) return;

        try {
            const response = await fetch(`${API_URL}/veiculos/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${tokenJWT}` }
            });

            if (response.ok) {
                buscarVeiculos(); // Atualiza a lista
            }
        } catch (error) {
            console.error("Erro ao deletar", error);
        }
    }

    // Função auxiliar para desenhar a lista na tela
    function renderizarLista(veiculos) {
        const divLista = document.getElementById('lista-veiculos');
        divLista.innerHTML = ''; // Limpa a lista atual

        if(veiculos.length === 0) {
            divLista.innerHTML = '<p style="text-align:center; color:#7f8c8d;">Nenhum veículo cadastrado no estoque.</p>';
            return;
        }

        veiculos.forEach(v => {
            divLista.innerHTML += `
                <div class="card">
                    <div>
                        <strong>#${v.id} - ${v.marca}</strong><br>
                        <span style="color: #666;">Modelo: ${v.modelo}</span>
                    </div>
                    <button class="btn-danger" onclick="deletarVeiculo(${v.id})">Excluir</button>
                </div>
            `;
        });
    }

    // Logout
    function sair() {
        tokenJWT = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }
</script>

</body>
</html>
